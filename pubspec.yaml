name: school_admission_application
description: "A new Flutter project."
# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: 'none' # Remove this line if you wish to publish to pub.dev


version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter
  firebase_core: ^3.13.0
  firebase_auth: ^5.5.4
  cloud_firestore: ^5.6.2
  firebase_messaging: ^15.2.5
  firebase_storage: ^12.4.5
  flutter_secure_storage: ^9.2.4
  dio: ^5.8.0+1
  get_storage: ^2.1.1
  image_picker: ^1.1.2
  permission_handler: ^12.0.0+1
  url_launcher: ^6.3.1
  connectivity_plus: ^6.1.3
  intl: ^0.20.2
  uuid: ^4.5.1
  local_auth: ^2.3.0
  qr_flutter: ^4.1.0
  flutter_screenutil: ^5.9.3
  oktoast: ^3.4.0
  provider: ^6.1.5+1
  carousel_slider: ^5.0.0
  pinput: ^5.0.1
  webview_flutter: ^4.11.0
  flutter_inappwebview: ^6.1.5
  country_flags: ^3.2.0
  flutter_svg: ^2.1.0
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:

  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/fonts/
  fonts:
   - family: PlusJakartaSans
     fonts: 
      - asset: assets/fonts/PlusJakartaSans/PlusJakartaSans-Bold.ttf
        weight: 700
      - asset: assets/fonts/PlusJakartaSans/PlusJakartaSans-Regular.ttf
        weight: 400
      - asset: assets/fonts/PlusJakartaSans/PlusJakartaSans-SemiBold.ttf
        weight: 600
      - asset: assets/fonts/PlusJakartaSans/PlusJakartaSans-Medium.ttf
        weight: 500
    
   - family: Inter
     fonts:
      - asset: assets/fonts/Inter/Inter_18pt-Regular.ttf
        weight: 400
      - asset: assets/fonts/Inter/Inter_18pt-Medium.ttf
        weight: 500
      - asset: assets/fonts/Inter/Inter_18pt-SemiBold.ttf
        weight: 600
      - asset: assets/fonts/Inter/Inter_18pt-Bold.ttf
        weight: 700

   - family: DMSans
     fonts:
      - asset: assets/fonts/DMSans/DMSans_18pt-Regular.ttf
        weight: 400
      - asset: assets/fonts/DMSans/DMSans_18pt-Medium.ttf
        weight: 500
      - asset: assets/fonts/DMSans/DMSans_18pt-SemiBold.ttf
        weight: 600
      - asset: assets/fonts/DMSans/DMSans_18pt-Bold.ttf
        weight: 700


  

